  description:
    value: >-
      <p>You’ve honed your combat skills to entertain, devastating opponents and
      dazzling onlookers. You gain the following
      benefits.</p><p><strong>Athletic Flair.</strong> Whenever you make a
      Dexterity (Acrobatics) or Strength (Athletics) check, you gain a bonus to
      the check equal to your Charisma modifier (minimum of
      +1).</p><p><strong>Bonus Proficiency.</strong> You gain proficiency in one
      of these skills of your choice: Acrobatics, Athletics, Deception,
      Intimidation, or Performance.</p><section id="secret-15j7EtxjJZYDFgu3"
      class="secret"><p><strong>Foundry Note</strong></p><p>This feature
      includes an Active Effect which automates the bonus to your Acrobatics and
      Athletics checks. Bonus Proficiency is granted as you level
      up.</p></section>
