  description:
    value: >-
      <p>You’ve learned to stylishly counter blows from your opponents. When an
      enemy hits you with a melee attack roll, you can take a
      &amp;Reference[Reaction]{Reaction} to add your Charisma modifier (minimum
      of +1) to your AC against the attack, potentially causing the attack to
      miss.</p><p><strong>Flourish Counter.</strong> If this Reaction causes the
      attack to miss, you can retaliate with a powerful counterattack as part of
      the same Reaction. Make an attack roll with a Melee weapon against the
      triggering creature. If this attack hits, you can use one of your
      @UUID[Compendium.UA2025-ApocalypticSubclasses.classes.Item.uaftrBrutality00]{Brutality}
      effects on the target without expending a use of that feature.</p><p>Once
      this counterattack hits, you can’t use this feature to make another
      counterattack until you finish a &amp;Reference[Long Rest]. You can also
      restore your use of this counterattack by expending a use of
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbftrSecondWind]{Second
      Wind} (no action required).</p><section class="secret"
      id="secret-HOOvlMfUjJVkP3ij"><p><strong>Foundry Note</strong></p><p>The
      Reaction here tracks the use per Long Rest and puts you new AC as a roll
      in chat. If the follow up attack from Flourish Counter missed, click the
      restore usage button in chat.</p><p>When you use a Brutality Effect,
      uncheck "Consume uses". </p><p>This feature also has an activity to spend
      Second Wind to rechage its use.</p></section>
