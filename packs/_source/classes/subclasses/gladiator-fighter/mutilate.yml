  description:
    value: >-
      <p>When you hit a &amp;Reference[Bloodied] creature with an attack roll,
      you can attempt to critically injure it. The target makes a [[/save con
      dc=@abilities.con.dc]]{Constitution saving throw} (DC 8 plus your Charisma
      modifier and Proficiency Bonus). On a failed save, the target suffers the
      following effects:</p><p><strong>Maimed.</strong> If the target takes the
      Attack action, it can make only one
      attack.</p><p><strong>Sluggish.</strong> The target’s
      &amp;Reference[Speed] is halved, and it has a −2 penalty to its Armor
      Class.</p><p>These effects last until the target regains Hit
      Points.</p><p>Once a target fails its saving throw against this feature,
      you can’t use it again until you finish a &amp;Reference[Long
      Rest].</p><section id="secret-Sib9EsxfhgjXx0yd"
      class="secret"><p><strong>Foundry Note</strong></p><p>If a creature
      succeeds on its saving throw again this feature, click "Refund usage" in
      chat.</p></section>
