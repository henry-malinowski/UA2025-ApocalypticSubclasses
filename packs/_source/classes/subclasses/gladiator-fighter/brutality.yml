  description:
    value: >-
      <p>Shaped by the intensity of the arena, you’ve learned to execute brutal
      martial moves. Once per turn, when you hit a creature with an attack roll
      using a Melee weapon, you can add one of the following Brutality effects
      of your choice. You can do this a number of times equal to your Charisma
      modifier (minimum of once), and you regain all expended uses when you
      finish a Short or Long
