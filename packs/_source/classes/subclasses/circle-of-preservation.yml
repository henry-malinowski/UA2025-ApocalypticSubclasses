  description:
    value: >-
      <blockquote><p>Safeguard Nature and Heal the
      World</p></blockquote><p>Druids of the Circle of Preservation work
      tirelessly to conserve natural resources and restore places once ruined by
      greed and exploitation. Through a combination of conservation and
      restorative magic, Druids of this order shield and spread life across the
      land. The most powerful members of this order can return vitality to
      barren fields, transforming wastelands into thriving wildernesses once
      more.</p>
