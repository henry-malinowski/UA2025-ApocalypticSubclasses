  description:
    value: >-
      <p>As a Bonus Action, you can expend a use of your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbdrdWildShape0]{Wild
      Shape} to fill a 15-foot Cube originating from a point on the ground you
      can see within 120 feet of yourself with revitalizing energy. The effect
      lasts for 1 minute or until you have the &amp;Reference[Incapacitated
      apply=false] condition, are more than 120 feet away from the Cube, or
      die.</p><p>Whenever a creature (including you) ends its turn in the Cube,
      you can grant the creature one of the following
      benefits:</p><p><strong>Bolster.</strong> The creature gains Temporary Hit
      Points equal to [[/heal 1d4+@classes.druid.levels temp]]{1d4 plus your
      Druid level}.</p><p><strong>Purify.</strong> You end one effect on the
      creature causing it to have the &amp;Reference[Frightened apply=false] or
      &amp;Reference[Poisoned apply=false] condition.</p><p>In addition,
      nonmagical vegetation native to the region sprouts on ground within the
      Cube. This vegetation disappears when the effect ends.</p><p>As a Bonus
      Action on subsequent turns, you can move the Cube up to 30 feet to another
      area on the ground within 120 feet of yourself.</p><section class="secret"
      id="secret-WIfLJYdaqXoPV6CG"><p><strong>Foundry Note</strong></p><p>To
      move the Preserved Land on subsequent turns, switch to the template layer,
      and move the previously placed cube tempate.</p></section>
