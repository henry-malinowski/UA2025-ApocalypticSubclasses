  description:
    value: >-
      <p>Your
      @UUID[Compendium.UA2025-ApocalypticSubclasses.classes.Item.uadrdPreservedLa]{Preserved
      Land} becomes more powerful in the following ways.</p><p><strong>Fortify
      Protectors.</strong> While inside the Cube created by your Preserved Land,
      you and your allies gain a bonus to Constitution saving throws equal to
      your Wisdom modifier (minimum of +1). (Currently +[[lookup
      @abilities.wis.mod]])</p><p><strong>Reject Desecrators.</strong> Whenever
      the Cube created by your Preserved Land enters an enemy’s space and
      whenever an enemy enters the Cube or ends its turn there, that enemy makes
      a [[/save wis dc=@abilities.wis.dc]]{Wisdom saving throw against your
      spell save DC}. On a failed save, the enemy takes [[/damage 2d10
      radiant]]{2d10 Radiant damage}, and its &amp;Reference[Speed] is halved
      until the end of its next turn as new growth rises to hinder it. On a
      successful save, the enemy takes half as much damage only. An enemy makes
      this save only once per turn.</p>
