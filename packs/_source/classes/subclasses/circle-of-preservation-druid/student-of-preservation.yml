  description:
    value: >-
      <p>Your studies have improved your understanding of the order and
      resilience of nature, granting you the following
      benefits.</p><p><strong>Frugal Casting.</strong> When you cast a
      @UUID[Compendium.dnd-players-handbook.content.JournalEntry.phbSpells0000000.JournalEntryPage.LhvuDQEyrCdg5EfU]{Druid
      spell}, you can cast it without &amp;Reference[Material]{Material}
      components, except Material components that are consumed by the spell or
      that have a cost specified in the spell.</p><p>Additionally, whenever you
      cast a Druid spell that requires a Material component that is consumed by
      the spell, there is a [[/r 1d100cs&lt;=10]]{10 percent chance} that the
      component isn’t consumed as part of that casting.</p><p><strong>Tool
      Proficiency.</strong> You gain proficiency with one type of Artisan’s
      Tools of your choice.</p><section id="secret-bxtWDqBn2KbSJtB7"
      class="secret"><p><strong>Foundry Note</strong></p><p>Tool Proficiency is
      automatically granted as you level up.</p></section>
