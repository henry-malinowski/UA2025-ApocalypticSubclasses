  description:
    value: >-
      <p>You learn further ways to tap into the corrupting magic within
      yourself, granting you the following benefits.</p><p><strong>Defiler’s
      Ward.</strong> When you take a Bonus Action to transform Sorcery Points
      into a spell slot, you can wreathe your body in a protective web of
      defiling energy. Roll a number of d6s equal to the level of spell slot
      created. You gain &amp;Reference[Temporary Hit Points] equal to the total
      rolled.</p><p>If a creature hits you with a melee attack roll while you
      have Temporary Hit Points, the creature takes &amp;Reference[Necrotic] or
      &amp;Reference[Poison] damage (your choice) equal to your Charisma
      modifier (currently [[lookup
      @abilities.cha.mod]]).</p><p><strong>Strengthened Rot.</strong> Damage
      dealt by your Sorcerer spells and Sorcerer features ignores
      &amp;Reference[Resistance] to Necrotic and Poison damage.</p>
