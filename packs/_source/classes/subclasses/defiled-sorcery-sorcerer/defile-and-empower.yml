  uses:
    spent: 0
    recovery: []
    max: ''
  description:
    value: >-
      <p>Once per turn when you roll damage for a spell you cast using a spell
      slot, you can siphon your life energy into the spell and empower it. Roll
      a number of your unexpended Hit Point Dice, up to a number equal to half
      the level of spell slot expended (round up, minimum of one die), and add
      the total rolled to one damage roll of the spell. Those Hit Point Dice are
      then expended.</p><p><strong>Life Steal.</strong> Instead of drawing on
      your own life force when you use this feature, you can try to steal life
      from another creature you can see within 30 feet of yourself. That
      creature makes a [[/save con dc=@abilities.wis.dc]]{Constitution saving
      throw against your spell save DC}; creatures that have Immunity to the
      &amp;Reference[Exhaustion apply=false] condition automatically succeed on
      the save. On a failed save, in place of rolling your Hit Point Dice, roll
      a number of the creature’s unexpended Hit Point Dice, up to a number equal
      to half the level of slot expended (round down, minimum of one die); you
      then add that total rolled to one damage roll of the spell, and those Hit
      Point Dice are expended for the creature.</p><p>Once a creature fails its
      save against Life Steal, you can’t use Life Steal again until you finish a
      &amp;Reference[Long Rest] unless you expend 3 Sorcery Points (no action
      required) to restore your use of it.</p><section class="secret"
      id="secret-fbeOOEK2z64jNu7F"><p><strong>Foundry Note</strong></p><p>After
      successfully using Life Steal against a creature, use the expend Hit Die
      for the Hit Die of the creature and uncheck "Consume Hit Die?" to not
      consume <em>your</em> Hit Point Dice.</p></section>
    chat: ''
