  description:
    value: >-
      <p>When you use your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbscrInnateSorc]{Innate
      Sorcery}, an aura of defiling magic fills a 15-foot Emanation originating
      from you while your Innate Sorcery is active, granting you the following
      additional benefits.</p><p><strong>Defiling Shroud.</strong> When an enemy
      within the aura hits you with an attack roll, you can reduce that attack’s
      total damage against you. The reduction equals your Charisma
      modifier.</p><p><strong>Essence Siphon.</strong> When an enemy dies within
      the aura, you regain [[/r 1d4]] Sorcery Points. Once you use this benefit,
      you can’t regain Sorcery Points in this way until you use Innate Sorcery
      again.</p>
