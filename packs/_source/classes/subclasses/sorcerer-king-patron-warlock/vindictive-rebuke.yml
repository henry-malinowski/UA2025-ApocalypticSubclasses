  description:
    value: >-
      <p>You learn to rebuff those who challenge you or the might of your
      patron. When an enemy hits you with an attack roll, you can take a
      &amp;Reference[Reaction]{Reaction} to force the enemy to reroll the [[/r
      d20]], and the enemy must use the new roll. If this Reaction turns the
      attack roll into a miss, the triggering creature takes [[/damage
      @classes.warlock.levels psychic average]]{Psychic damage equal to your
      Warlock level}.</p><p>You can use this feature a number of times equal to
      your Charisma modifier (minimum of once), and you regain all expended uses
      when you finish a &amp;Reference[Long Rest].</p>
