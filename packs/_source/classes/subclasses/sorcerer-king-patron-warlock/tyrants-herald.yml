    value: >-
      <p>You gain the following benefits.</p><p><strong>Intimidating
      Presence.</strong> You gain proficiency in the Intimidation skill if you
      don’t already have it. You also have Expertise in
      Intimidation.</p><p><strong>Voice of Tyranny.</strong> You can cast
      <em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplCommand000]{Command}</em>
      as a Bonus Action without expending a spell slot. You can do so a number
      of times equal to your Charisma modifier (minimum of once), and you regain
      all expended uses when you finish a Long Rest. (currently [[lookup
      @abilities.cha.mod]])</p><section class="secret"
      id="secret-vmMRptLSHuAsnkx7"><p><strong>Foundry
      Note</strong></p><p>Intimidation Expertice is granted on level up. Command
      in your spells tab has free uses.</p></section>
