  description:
    value: >-
      <p>The magic of your patron ensures you always have certain spells ready;
      when you reach a Warlock level specified in the Sorcerer-King Spells
      table, you thereafter always have the listed spells
      prepared.</p><p><strong>Psionic Casting.</strong> When you cast a spell
      from the Sorcerer-King Spells table, you can do so without
      @UUID[Compendium.dnd5e.rules.JournalEntry.NizgRXLNUqtdlC1s.JournalEntryPage.6UXTNWMCQ0nSlwwx]{Verbal}
      or &amp;Reference[Material]{Material} components, except Material
      components that are consumed by the spell or that have a cost specified in
      the spell.</p><table><caption>Sorcerer-King
      Spells</caption><thead><tr><td>Warlock
      Level</td><td>Spells</td></tr></thead><tbody><tr><td>3</td><td><em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplCommand000]{Command},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplCompelledD]{Compelled
      Duel},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplHoldPerson]{Hold
      Person},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplMindSpike0]{Mind
      Spike},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplWrathfulSm]{Wrathful
      Smite}</em></td></tr><tr><td>5</td><td><em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplFear000000]{Fear},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplSending000]{Sending}</em></td></tr><tr><td>7</td><td><em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplCompulsion]{Compulsion},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplStaggering]{Staggering
      Smite}</em></td></tr><tr><td>9</td><td><em>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDominatePe]{Dominate
      Person},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplSynapticSt]{Synaptic
      Static}</em></td></tr></tbody></table><section class="secret"
      id="secret-UtRaj9TxBVIgeYVi"><p><strong>Foundry Note</strong></p><p>As you
      level up these spells will be granted to you automatically.</p></section>
