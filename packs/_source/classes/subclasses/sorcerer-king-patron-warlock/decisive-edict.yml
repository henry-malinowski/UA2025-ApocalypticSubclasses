  description:
    value: >-
      <p>Your patron’s power surges through you, allowing you to rally your
      allies and subjugate your enemies. When you cast a spell using a
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbwlkPactMagic0]{Pact
      Magic} spell slot, you can cause profane power to erupt in a 30-foot
      Emanation originating from you. For each creature you can see in the
      Emanation, choose one of the following
      effects:</p><p><strong>Marshal.</strong> The creature has
      &amp;Reference[Advantage] on attack rolls until the end of its next
      turn.</p><p><strong>Oppress.</strong> The creature must succeed on a
      [[/save wis dc=@abilities.cha.dc]]{Wisdom saving throw against your spell
      save DC} or have the &amp;Reference[Frightened] condition until the end of
      its next turn.</p><p>Once you use this feature, you can’t do so again
      until you finish a Short or Long Rest. You also regain use of this feature
      when you use
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbwlkMagicalCun]{Magical
      Cunning}.</p><section id="secret-rNQemkIce4Ent9kE"
      class="secret"><p><strong>Foundry Note</strong></p><p>There is no
      automation for Advantage on attacks granted by Marshal.</p></section>
