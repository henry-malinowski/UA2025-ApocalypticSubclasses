    name: Defiled Sorcery (Sorcerer)
    type: subclass
    _id: yMGsUcsSM8yPXXMz
    system:
      item: Compendium.UA2025-ApocalypticSubclasses.classes.Item.uasrcDefiledSorc
      description:
        value: >-
          <blockquote><p>Siphon Life into Catastrophic
          Spells</p></blockquote><p>Your innate power siphons life essence from
          the surrounding world. At your command, creatures grow sick and plants
          wither to husks. You draw power from the corruption of life itself,
          draining vitality to fuel destructive magic.</p>
