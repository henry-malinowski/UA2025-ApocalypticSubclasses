      description:
        value: >-
          <blockquote><p>Master Brutality and Blood
          Sport</p></blockquote><p>@UUID[Compendium.UA2025-ApocalypticSubclasses.classes.Item.uaftrGladiator00]{Gladiators}
          are just as much performers as they are warriors. Whether brawling in
          underground fighting rings or fighting for survival in bloodstained
          arenas, a Gladiator combines martial skill with theatrics to awe and
          intimidate their audiences.</p>
